name: Dream Day CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias backend
        working-directory: ./backend
        run: npm install

      - name: Verificar sintaxis de archivos clave
        working-directory: ./backend
        run: |
          node -c src/server.js && echo "✅ server.js OK"
          node -c src/middleware/auth.js && echo "✅ auth.js OK"
          node -c src/middleware/abac.js && echo "✅ abac.js OK"
          node -c src/routes/auth.js && echo "✅ routes/auth.js OK"
          node -c src/routes/sessions.js && echo "✅ routes/sessions.js OK"
          node -c src/services/emailService.js && echo "✅ emailService.js OK"

      - name: Instalar dependencias frontend
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://dreamday.onrender.com/api

  security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar Helmet
        run: grep -q "helmet" backend/src/server.js && echo "✅ Helmet configurado"

      - name: Verificar Rate Limiting
        run: grep -q "rateLimit" backend/src/routes/auth.js && echo "✅ Rate limiting configurado"

      - name: Verificar CORS
        run: grep -q "cors" backend/src/server.js && echo "✅ CORS configurado"

      - name: Verificar JWT middleware
        run: grep -q "jwt.verify" backend/src/middleware/auth.js && echo "✅ JWT middleware"

      - name: Verificar bcrypt
        run: grep -q "bcrypt" backend/src/models/Usuario.js && echo "✅ bcrypt configurado"

      - name: Verificar sin secretos expuestos
        run: |
          if grep -rn "JWT_SECRET\s*=\s*['\"]" --include="*.js" backend/src/ | grep -v "process.env"; then
            echo "❌ Secretos encontrados"
            exit 1
          else
            echo "✅ Sin secretos expuestos"
          fi

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-validate, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy automático
        run: |
          echo "🚀 Deploy automático activado"
          echo "Render y Vercel redespligan automáticamente al detectar push a main"
          echo "Backend: https://dreamday.onrender.com"
          echo "Frontend: https://dream-day-six.vercel.app"
          echo "✅ Pipeline completado exitosamente"
