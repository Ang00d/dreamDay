# ============================================
# DREAM DAY — CI/CD Pipeline
# Práctica 2 — GitHub Actions
#
# Flujo: Push a main → Test → Build → Deploy
# ============================================

name: Dream Day CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Lint y validación ────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias backend
        working-directory: ./backend
        run: npm ci --production=false

      - name: Verificar sintaxis backend
        working-directory: ./backend
        run: node -c src/server.js && echo "✅ Sintaxis OK"

      - name: Instalar dependencias frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  # ── Job 2: Tests de seguridad ──────────────────────────────
  security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias
        working-directory: ./backend
        run: npm ci --production=false

      - name: Auditar dependencias
        working-directory: ./backend
        run: npm audit --audit-level=high || true

      - name: Verificar variables de entorno no expuestas
        run: |
          echo "Verificando que no haya secretos en el código..."
          ! grep -r "JWT_SECRET.*=" --include="*.js" backend/src/ | grep -v "process.env" | grep -v "SKILL" || echo "✅ Sin secretos expuestos"

      - name: Verificar Helmet configurado
        run: |
          grep -l "helmet" backend/src/server.js && echo "✅ Helmet configurado"

      - name: Verificar Rate Limiting
        run: |
          grep -l "rateLimit\|rate-limit" backend/src/routes/auth.js && echo "✅ Rate limiting configurado"

  # ── Job 3: Build Docker ─────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build Docker image (backend)
        run: docker build -t dreamday-backend ./backend

      - name: Verificar imagen creada
        run: docker images dreamday-backend && echo "✅ Imagen Docker creada"

  # ── Job 4: Deploy (solo en push a main) ─────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy backend a Render
        run: |
          echo "🚀 Deploy automático a Render activado via webhook"
          echo "Render detecta el push a main y redespliega automáticamente"

      - name: Deploy frontend a Vercel
        run: |
          echo "🚀 Deploy automático a Vercel activado"
          echo "Vercel detecta el push a main y redespliega automáticamente"

      - name: Notificar deploy exitoso
        run: |
          echo "✅ Pipeline completado"
          echo "Backend: https://dreamday-api.onrender.com"
          echo "Frontend: https://dreamday.vercel.app"
