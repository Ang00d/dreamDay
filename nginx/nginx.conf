# ============================================
# DREAM DAY — Nginx Configuration
# Práctica 2 — Reverse Proxy + Load Balancer
#
# Nginx actúa como:
# 1. Reverse Proxy — redirige peticiones al backend
# 2. Load Balancer — distribuye carga (preparado)
# 3. SSL Termination — maneja HTTPS
# 4. Cache — archivos estáticos
# ============================================

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Optimización
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate Limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;

    # ── Upstream (Load Balancer - preparado para escalar) ──
    upstream dreamday_backend {
        server backend:5000;
        # Para escalar, agregar más servidores:
        # server backend2:5000;
        # server backend3:5000;
    }

    # ── Server Block ──────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API Backend (Reverse Proxy) ───────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://dreamday_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rate limit más estricto para login
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://dreamday_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Frontend (archivos estáticos) ─────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── Cache para assets estáticos ───────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Health check ──────────────────────────────────
        location /health {
            proxy_pass http://dreamday_backend/api/health;
        }
    }
}
