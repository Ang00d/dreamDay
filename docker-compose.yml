# ============================================
# DREAM DAY — Docker Compose (Full Stack)
# Práctica 2 — Dockerización completa
#
# Uso: docker-compose up -d
# ============================================

version: '3.8'

services:
  # ── Backend API ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: dreamday-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - dreamday-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: dreamday-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    networks:
      - dreamday-network

  # ── Nginx (Reverse Proxy + Load Balancer) ────────────────
  nginx:
    image: nginx:alpine
    container_name: dreamday-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dreamday-network

volumes:
  mongodb-data:

networks:
  dreamday-network:
    driver: bridge
